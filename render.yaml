services:
  - type: web
    name: afours-erp
    runtime: python
    rootDir: afours
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        value: "REPLACE_WITH_NEON_DATABASE_URL"
